name: Build and Release

# Triggers when you push a version tag, e.g.:
#   git tag v1.0.0
#   git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller face-sequence-aligner.spec

      - name: Zip release
        run: Compress-Archive -Path dist\FaceSequenceAligner -DestinationPath FaceSequenceAligner-windows.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: FaceSequenceAligner-windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
